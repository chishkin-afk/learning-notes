app:
  name: notes
  version: 0.0.0
  env: ${APP_ENV}

server:
  http:
    addr: ${HTTP_ADDR}
    tls:
      enable: false
      server_cert_path: ./certs/server.crt
      server_key_path: ./certs/server.key
  conns:
    read_timeout: 2s
    write_timeout: 2s
    idle_timeout: 30s

persistence:
  migrations_path: ./migrations
  postgres:
    host: ${POSTGRES_HOST}
    port: ${POSTGRES_PORT}
    sslmode: disable
    auth:
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      db: ${POSTGRES_DB}
    conns:
      max_idles: 15
      max_opens: 5
      max_idle_time: 30m
      max_lifetime: 15m

cache:
  note_ttl: 5m
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    auth:
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      db: ${REDIS_DB}